name: INSURANCE_INTELLIGENCE
description: Life insurance portfolio analytics for CA Vida - Portuguese insurance
  company. Tracks policy exposure, premiums, cash values, coverage types, and distribution
  channels. Used by actuaries and business analysts to monitor portfolio health, persistency,
  and premium evolution.
tables:
  - name: LIFE_UNIT_OF_EXPOSURE
    base_table:
      database: CAVIDA_POC
      schema: DW
      table: LIFE_UNIT_OF_EXPOSURE
    dimensions:
      - name: UOE_RK
        expr: UOE_RK
        data_type: NUMBER
      - name: POLICY_RK
        expr: POLICY_RK
        data_type: VARCHAR
        synonyms:
          - policy key
          - policy identifier
      - name: X_POLICY_PROPOSAL_RK
        expr: X_POLICY_PROPOSAL_RK
        data_type: VARCHAR
      - name: X_POLICY_VERSION
        expr: X_POLICY_VERSION
        data_type: NUMBER
        description: Version number of the policy
      - name: X_ORDER_CD
        expr: X_ORDER_CD
        data_type: VARCHAR
      - name: COVERAGE_RIDER_RK
        expr: COVERAGE_RIDER_RK
        data_type: VARCHAR
      - name: X_POLICY_STATUS_CD
        expr: X_POLICY_STATUS_CD
        data_type: VARCHAR
        description: Current status code of the policy
        synonyms:
          - policy status
          - status
          - estado da apolice
      - name: RENEWABLE_IND
        expr: RENEWABLE_IND
        data_type: VARCHAR
        description: Indicates if the policy is renewable
        synonyms:
          - renewable
          - renovavel
      - name: X_ORDER_STATUS
        expr: X_ORDER_STATUS
        data_type: VARCHAR
      - name: LOB_RK
        expr: LOB_RK
        data_type: VARCHAR
        description: Line of business reference key
        synonyms:
          - line of business
          - ramo
    time_dimensions:
      - name: VALID_FROM_DTTM
        expr: VALID_FROM_DTTM
        data_type: TIMESTAMP_LTZ
      - name: X_ADMISSION_DT
        expr: X_ADMISSION_DT
        data_type: DATE
        description: Date the policy was admitted/issued
        synonyms:
          - admission date
          - issue date
          - data de admissao
      - name: EFFECTIVE_DT
        expr: EFFECTIVE_DT
        data_type: DATE
        description: Policy effective start date
        synonyms:
          - effective date
          - start date
          - data de inicio
      - name: EXPIRATION_DT
        expr: EXPIRATION_DT
        data_type: DATE
        description: Policy expiration date
        synonyms:
          - expiration date
          - end date
          - data de vencimento
      - name: X_ORDER_STATUS_DT
        expr: X_ORDER_STATUS_DT
        data_type: DATE
      - name: X_POLICY_TERMINATION_DT
        expr: X_POLICY_TERMINATION_DT
        data_type: DATE
        description: Date the policy was terminated/cancelled
        synonyms:
          - termination date
          - cancellation date
          - data de cancelamento
      - name: CHANGE_EFFECTIVE_FROM_DTTM
        expr: CHANGE_EFFECTIVE_FROM_DTTM
        data_type: TIMESTAMP_NTZ
      - name: CHANGE_EFFECTIVE_TO_DTTM
        expr: CHANGE_EFFECTIVE_TO_DTTM
        data_type: TIMESTAMP_NTZ
      - name: VALID_TO_DTTM
        expr: VALID_TO_DTTM
        data_type: TIMESTAMP_LTZ
      - name: PROCESSED_DTTM
        expr: PROCESSED_DTTM
        data_type: TIMESTAMP_LTZ
    facts:
      - name: ANNUAL_PREMIUM_AMT
        expr: ANNUAL_PREMIUM_AMT
        data_type: NUMBER
        description: Annual premium amount in EUR
        synonyms:
          - premium
          - annual premium
          - prima anual
          - premio
      - name: CASH_VALUE
        expr: CASH_VALUE
        data_type: NUMBER
        description: Cash surrender value of the policy
        synonyms:
          - cash value
          - valor de resgate
          - surrender value
      - name: X_INDEXATION_RT
        expr: X_INDEXATION_RT
        data_type: FLOAT
        description: Indexation rate applied to the policy
        synonyms:
          - indexation rate
          - taxa de indexacao
    metrics:
      - name: TOTAL_PREMIUM
        expr: SUM(ANNUAL_PREMIUM_AMT)
        description: Total annual premium across all policies
        synonyms:
          - total premium
          - prima total
      - name: TOTAL_CASH_VALUE
        expr: SUM(CASH_VALUE)
        description: Total cash value of all policies
        synonyms:
          - total cash value
          - valor total
      - name: NUM_POLICIES
        expr: COUNT(DISTINCT POLICY_RK)
        description: Number of distinct policies
        synonyms:
          - policy count
          - numero de apolices
      - name: AVG_PREMIUM
        expr: AVG(ANNUAL_PREMIUM_AMT)
        description: Average annual premium per exposure
        synonyms:
          - average premium
          - prima media
      - name: NUM_EXPOSURES
        expr: COUNT(*)
        description: Total number of exposure records
        synonyms:
          - exposure count
          - numero de exposicoes
      - name: TERMINATED_POLICIES
        expr: COUNT(DISTINCT CASE WHEN X_POLICY_TERMINATION_DT IS NOT NULL THEN POLICY_RK END)
        description: Number of policies that have been terminated
        synonyms:
          - cancelled policies
          - apolices canceladas
      - name: LOST_PREMIUM
        expr: SUM(CASE WHEN X_POLICY_TERMINATION_DT IS NOT NULL THEN ANNUAL_PREMIUM_AMT ELSE 0 END)
        description: Total premium from terminated policies
        synonyms:
          - lost premium
          - prima perdida
