relationships:
  - name: LIFE_UNIT_OF_EXPOSURE_TO_COVERAGE
    left_table: LIFE_UNIT_OF_EXPOSURE
    right_table: COVERAGE
    join_type: inner
    relationship_type: many_to_one
    relationship_columns:
      - left_column: COVERAGE_RIDER_RK
        right_column: COVERAGE_RK
  - name: LIFE_UNIT_OF_EXPOSURE_TO_INSURANCE_POLICY
    left_table: LIFE_UNIT_OF_EXPOSURE
    right_table: INSURANCE_POLICY
    join_type: left_outer
    relationship_type: many_to_one
    relationship_columns:
      - left_column: POLICY_RK
        right_column: POLICY_RK
verified_queries:
  - name: premium_by_status
    question: What is the total premium and number of policies by policy status?
    sql: SELECT X_POLICY_STATUS_CD, COUNT(DISTINCT POLICY_RK) AS num_policies, SUM(ANNUAL_PREMIUM_AMT)
      AS total_premium FROM life_unit_of_exposure GROUP BY X_POLICY_STATUS_CD
    verified_at: 1784680596
    verified_by: Semantic Model Generator
  - name: monthly_evolution
    question: What is the monthly evolution of new policies and premium?
    sql: SELECT DATE_TRUNC('MONTH', EFFECTIVE_DT) AS month, COUNT(DISTINCT POLICY_RK)
      AS new_policies, SUM(ANNUAL_PREMIUM_AMT) AS premium FROM life_unit_of_exposure
      WHERE NOT EFFECTIVE_DT IS NULL GROUP BY month ORDER BY month
    verified_at: 1784680596
    verified_by: Semantic Model Generator
  - name: premium_by_status_coverage
    question: What is the premium and cash value breakdown by policy status and coverage type?
    sql: SELECT u.X_POLICY_STATUS_CD, c.COVERAGE_TYPE_CD, COUNT(*) AS exposure_count,
      SUM(u.ANNUAL_PREMIUM_AMT) AS total_premium, SUM(u.CASH_VALUE) AS total_cash_value
      FROM life_unit_of_exposure AS u JOIN coverage AS c ON u.COVERAGE_RIDER_RK =
      c.COVERAGE_RK GROUP BY u.X_POLICY_STATUS_CD, c.COVERAGE_TYPE_CD
    verified_at: 1784680596
    verified_by: Semantic Model Generator
  - name: terminated_policies
    question: How many policies have been terminated and what is the total lost premium?
    sql: SELECT COUNT(DISTINCT POLICY_RK) AS terminated_policies, SUM(ANNUAL_PREMIUM_AMT)
      AS lost_premium FROM life_unit_of_exposure WHERE NOT X_POLICY_TERMINATION_DT
      IS NULL
    verified_at: 1784680596
    verified_by: Semantic Model Generator
  - name: avg_premium_renewable
    question: What is the average premium for renewable vs non-renewable policies?
    sql: SELECT RENEWABLE_IND, COUNT(DISTINCT POLICY_RK) AS num_policies, AVG(ANNUAL_PREMIUM_AMT)
      AS avg_premium FROM life_unit_of_exposure GROUP BY RENEWABLE_IND
    verified_at: 1784680596
    verified_by: Semantic Model Generator
